<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CG Reports</title>
  <script>
    // GitHub Pages SPA redirect hack
    // Redirige rutas desconocidas al index.html con el path como query param
    var segmentCount = 1; // número de segmentos del repo en la URL (cg-reports = 1)
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
